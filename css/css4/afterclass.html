<!--
    In this assignment, you will build a colourful 
    Ice Cream Shop Menu webpage using HTML and CSS. 
    They will use advanced CSS selectors to style menu items, 
    highlight a special flavour, add hover effects, 
    style the first letter of a paragraph, 
    and understand how sibling and child selectors target specific elements on a page.
                                                                            -->
<!DOCTYPE html>
<html>
    <head>
        <title>My Ice Cream Shop Menu</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>My Ice Cream Shop Menu</h1>

        <p>Welcome to Scoops of Joy!</p>

        <p class="shop-description">
            We serve colourful, creamy, and delicious ice cream flavours.
        </p>

        <div class="menu-box">
            <h2>Today's Ice Cream Flavours</h2>

            <ul>
            <li>Chocolate Delight</li>
            <li>Strawberry Swirl</li>
            <li>Mango Magic - Today's Special</li>
            <li>Vanilla Dream</li>
            <li>Blueberry Blast</li>
            </ul>

            <button>Order Now</button>
        </div>
    </body>
</html>
