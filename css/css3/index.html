<!--
    In this activity,You will build a superhero
    profile card for your very own hero. 
    The page has a dark blue background, 
    a giant yellow title with an orange shadow, 
    a tagline that transforms to Title Case, 
    section headings in UPPERCASE with underlines, 
    bold green powers, crossed-out weaknesses, 
    and a tilted gold badge.
                                                -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>My Superhero Profile</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="hero-name">
            <h1>Thunder Kid</h1>
            <p>the most powerful hero in the school</p>
        </div>
            <h2 class = "sp">super powers</h2>

        <div class="powers">
            <p>Can run faster than a cheetah</p>
            <p>Can lift a school bus</p>
        </div>
        <h2 class = "sp">weaknesses</h2>
        <div class="wk">
            <p>Maths homework</p>
            <p>Broccoli</p>
        </div>
        <div class="hero">
            <h2>top hero</h2>
        </div>
        <p class="by">
            Made by {__Your Name__}
        </p>
    </body>
