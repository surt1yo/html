<!--
    In this assignment, you will build a 
    restaurant menu webpage using HTML and CSS. 
    You will style the restaurant name, tagline, 
    menu sections, dish names, descriptions, 
    and offer banner using typography, text decoration, 
    text transform, transform, 
    text shadow, box shadow, and text indent.
                                                -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Restaurant Menu</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="menu">
            <h1>🍔 Bob's Restaurant</h1>
            <div class="menu-item">
                <span class="item-name">Cheeseburger</span>
                <span class="price">$8.99</span>
            </div>
            <div class="menu-item">
                <span class="item-name">Fries</span>
                <span class="price">$3.99</span>
            </div>
            <div class="menu-item">
                <span class="item-name">Pizza Slice</span>
                <span class="price">$4.50</span>
            </div>
            <div class="menu-item">
                <span class="item-name">Chicken Wrap</span>
                <span class="price">$7.99</span>
            </div>
            <div class="menu-item">
                <span class="item-name">Soft Drink</span>
                <span class="price">$2.50</span>
            </div>
        </div>
    </body>
</html>
