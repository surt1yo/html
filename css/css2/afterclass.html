<!--
    In this assignment, you will build a weather app 
    homepage using HTML and CSS. You will design a 
    simple weather dashboard with a patterned page background, 
    a gradient weather card, a weekly forecast section, 
    and a floating weather icon animation. 
    The activity focuses on CSS background properties, 
    gradients, and @keyframes animation.
                                                    -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>My Weather App</title>
        <link rel="stylesheet" href="style1.css">
    </head>
    <body>
        <div class="app-header">
            <h1>My Weather App</h1>
            <p>Your daily weather forecast at a glance!</p>
        </div>
        <div class="weather-card">
            <h2>Today's Weather</h2>
            <p>Sunny, 25°C</p>  
        </div>
        <div class="weekly-forecast">
            <h2>Weekly Forecast</h2>
            <ul>
                <li>Monday: Sunny, 25°C</li>
                <li>Tuesday: Cloudy, 22°C</li>
                <li>Wednesday: Rainy, 18°C</li>
                <li>Thursday: Sunny, 27°C</li>
                <li>Friday: Windy, 20°C</li>
                <li>Saturday: Stormy, 16°C</li>
                <li>Sunday: Sunny, 24°C</li>
            </ul>
        </div>
        <div class="weather-icon">
            ☀️
        </div>
