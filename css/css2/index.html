<!--
    In this activity, You will build a space-themed 
    webpage called My Space Page. The page has a dark
    gradient sky that fades from dark blue to navy. 
    A colourful banner at the top fades from purple to coral. 
    Below it sits a fun fact card, and a small glowing circle 
    twinkles between yellow and white using a CSS animation.
                                                            -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>My Space Page</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="pageheader">
            <h1>My Space Page</h1>
            <p>Welcome to my corner of the galaxy!</p>
        </div>
        <div class = "fun-fact">
            <h2>Fun Fact about Space!</h2>
            <p>The Sun is so big that one million Earths could fit inside it!</p>
        </div>
        <div class="star">

        </div>
        <p>
            Made by {__Your Name__}
        </p>
    </body>
</html>
