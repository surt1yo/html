<!--    
    Write a program to add a labelled progress bar to your web page using Bootstrap.
    -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Progress Bar</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div class="container">
            <h2>Basic Progress Bar</h2>
            <p>To create a default progress bar, add a .progress class to a container element and add
                the progress-bar class to its child element. Use the CSS width property to set the width of the
                progress bar:
            </p>
            <div class="progress">
                <div class="progress-bar" style="width: 70%;">
                    70%
                </div>
            </div>
        </div>
    </body>
</html>
