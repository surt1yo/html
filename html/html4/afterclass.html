<!--
    In this assignment, students will 
    create a complete media-based webpage 
    called My Media Adventure. The webpage 
    brings together everything learned in 
    the Media in HTML lesson: images,
    audio, video, and iframe embedding.
                                            -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>My Media Adventure</title>
    </head>
    <body>
        <h1>🎬 My Media Adventure</h1>
        <p>Welcome to my media adventure! Here, you'll find a collection of my favorite images, videos, and audio clips that I've discovered on the web. Let's dive in!</p>

        <h2>📸 Amazing Images</h2>
        <img src="https://example.com/amazing-image.jpg" alt="An amazing image" width="600">

        <h2>🎵 Awesome Audio</h2>
        <audio controls>
            <source src="https://example.com/awesome-audio.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <h2>🎥 Cool Videos</h2>
        <video width="640" height="360" controls>
            <source src="https://example.com/cool-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <h2>🎮 Fun Scratch Game</h2>
        <iframe 
        src="https://scratch.mit.edu/projects/490369832/embed"
        width="500"
        height="400"
        frameborder="0"
        scrolling="no"
        allowfullscreen>
    </iframe>

    </body>
