<!--
    In this activity, you will combine the 
    audio and video tags on a single webpage, building 
    an ocean-themed multimedia experience. 
    You will link source files, set format types, 
    enable controls, add loop behaviour, and 
    use the poster attribute — experiencing how 
    sound and moving images work together on one page.
                                                    -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Aquatic Beats Party</title>
    </head>
    <body>
        <h1>Aquatic Beats Party</h1>
        <h2>The ocean stage is ready!</h2>
        <p>Play the music and watch the aquatic animals swim through their beautiful underwater world.</p>
        <audio controls loop>
            <source src="aquatic.mp3" type="audio/mpeg">
        </audio>

        <br><br>
        <video controls loop poster="ocean.png" width="640" height="360">
            <source src="ocean.mp4" type="video/mp4">
            Your browser does not support the video element.
        </video>
    </body>
