<!--
    In this activity, you will use the 
    iframe tag to embed a live Scratch 
    game directly inside your own HTML page. 
    You will learn how each iframe attribute 
    works — src, width, height, frameborder, 
    scrolling, and allowfullscreen — 
    and how they combine to create a clean, 
    professional-looking embed.
                                            -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>My Scratch Game Embed</title>
    </head>
    <body>
        <h1>🎮 My Scratch Game Embed</h1>
        <p>Check out this awesome Scratch game I found! You can play it right here on my webpage.</p>

        <iframe 
        src="https://scratch.mit.edu/projects/490369832/embed"
        width="500"
        height="400"
        frameborder="0"
        scrolling="no"
        allowfullscreen>
    </iframe>
        
        
            
    </body>
</html>
