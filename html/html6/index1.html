<!--
    Write a program to create a webpage to collect 
    personal details like - email, name, gender, 
    and date of birth by using the form element of HTML. 
    Make sure you group these fields by using the 
    fieldset element and give a caption to it as well.
                                                    -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Personal Information</title>
    </head>
    <body>
        <h1>Personal Information</h1>
        <form>
            <fieldset>
                <legend>Personal Information</legend>

                <label for="name">Name:</label>
                <br>
                <input type="text" id="name" name="name" required>
                <br><br>


                <label for="email">Email:</label>
                <br>
                <input type="email" id="email" name="email" required>
                <br><br>


                <label for="gender">Gender:</label>
                <br>
                <input type="radio" id="male" name="gender">Male
                <input type="radio" id="female" name="gender">Female
                <br><br>


                <label for="birthdate">Date of Birth:</label>
                <br>
                <input type="date" id="birthdate" name="birthdate" required>
                <br><br>
            </fieldset>
        </form>
    </body>
</html>
