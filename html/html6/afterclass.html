<!--
    In this activity, you are going to add some more 
    fields to your registration form which 
    you have created in the classroom activity.
                                                -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Personal Information</title>
    </head>
    <body>
        <h1>Personal Information</h1>
        <form>
            <fieldset>
                <legend>Personal Information</legend>

                <label for="name">Name:</label>
                <br>
                <input type="text" id="name" name="name" required>
                <br><br>


                <label for="email">Email:</label>
                <br>
                <input type="email" id="email" name="email" required>
                <br><br>


                <label for="gender">Gender:</label>
                <br>
                <input type="radio" id="male" name="gender">Male
                <input type="radio" id="female" name="gender">Female
                <br><br>


                <label for="birthdate">Date of Birth:</label>
                <br>
                <input type="date" id="birthdate" name="birthdate" required>
                <br><br>


                <label for="contact">Contact Number:</label>
                <br>
                <input type="tel" id="contact" name="contact" required>
                <br><br>


                <label for="city">Favourite City:</label>
                <br>
                <input type="checkbox" id="city" name="city" value="New York">New York
                <input type="checkbox" id="city" name="city" value="Paris">Paris
                <input type="checkbox" id="city" name="city" value="Tokyo">Tokyo
                <input type="checkbox" id="city" name="city" value="Sydney">Sydney
            </fieldset>
        </form>
    </body>
</html>
